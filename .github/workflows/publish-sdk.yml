name: Publish SDK

on:
  push:
    branches: [main]
    tags:
      - 'sdk-v*'
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  id-token: write

env:
  NODE_VERSION: '22'
  PNPM_VERSION: '9.15.0'

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          registry-url: 'https://npm.pkg.github.com'
          scope: '@karyl-chan'

      - run: pnpm install --frozen-lockfile

      - run: pnpm --filter @karyl-chan/plugin-sdk build

      - run: pnpm --filter @karyl-chan/plugin-sdk test

      - name: Verify tag matches package.json version
        if: startsWith(github.ref, 'refs/tags/sdk-v')
        run: |
          TAG="${GITHUB_REF#refs/tags/sdk-v}"
          PKG=$(node -p "require('./packages/sdk/package.json').version")
          if [ "$TAG" != "$PKG" ]; then
            echo "::error::tag sdk-v$TAG does not match package.json version $PKG"
            exit 1
          fi
          echo "tag matches package.json: $PKG"

      - name: Set edge prerelease version
        if: github.ref == 'refs/heads/main'
        working-directory: packages/sdk
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          npm version --no-git-tag-version "0.0.0-edge.${SHORT_SHA}"

      - name: Publish to GitHub Packages
        working-directory: packages/sdk
        run: pnpm publish --access public --no-git-checks --tag ${{ startsWith(github.ref, 'refs/tags/sdk-v') && 'latest' || 'edge' }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
