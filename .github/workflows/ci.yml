name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '22'
  PNPM_VERSION: '9.15.0'

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    name: Build & test (${{ matrix.target }})
    strategy:
      fail-fast: false
      matrix:
        target: [sdk, plugins]
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build SDK
        if: matrix.target == 'sdk'
        run: pnpm --filter @karyl-chan/plugin-sdk build

      - name: Test SDK
        if: matrix.target == 'sdk'
        run: pnpm --filter @karyl-chan/plugin-sdk test

      # The plugins import @karyl-chan/plugin-sdk via the workspace symlink,
      # whose package.json `types` points at dist/ — so the SDK must be
      # built before tsc can resolve it from a plugin package.
      - name: Build plugins
        if: matrix.target == 'plugins'
        run: |
          pnpm --filter @karyl-chan/plugin-sdk build
          pnpm -r --filter '!@karyl-chan/plugin-sdk' --filter './packages/*' build

  docker-smoke:
    runs-on: ubuntu-latest
    name: Docker smoke build (${{ matrix.plugin }})
    needs: build-and-test
    if: github.event_name == 'pull_request'
    strategy:
      fail-fast: false
      matrix:
        plugin: [radio, avalon]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build ${{ matrix.plugin }} image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.${{ matrix.plugin }}
          push: false
          tags: karyl-plugin-${{ matrix.plugin }}:ci
          cache-from: type=gha,scope=plugin-${{ matrix.plugin }}
          cache-to: type=gha,mode=max,scope=plugin-${{ matrix.plugin }}
