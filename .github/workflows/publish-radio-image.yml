name: Publish radio image

on:
  push:
    branches: [main]
    tags:
      - 'radio-v*'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_OWNER: ${{ github.repository_owner }}

jobs:
  publish:
    name: Push radio image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: tags
        run: |
          OWNER_LC=$(echo "${{ env.IMAGE_OWNER }}" | tr '[:upper:]' '[:lower:]')
          IMG="${{ env.REGISTRY }}/${OWNER_LC}/karyl-radio-plugin"
          REF="${GITHUB_REF}"
          if [[ "$REF" == refs/tags/radio-v* ]]; then
            # tag form: radio-v<semver>  → :<semver> + :latest
            VERSION="${REF#refs/tags/radio-v}"
            echo "tags=$IMG:$VERSION,$IMG:latest" >> "$GITHUB_OUTPUT"
          else
            # push to main / manual dispatch → :edge
            echo "tags=$IMG:edge" >> "$GITHUB_OUTPUT"
          fi

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.radio
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            karyl.plugin.key=radio
          cache-from: type=gha,scope=plugin-radio
          cache-to: type=gha,mode=max,scope=plugin-radio
