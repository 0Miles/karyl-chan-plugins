# Plugin services. Each plugin gets its own container and image so it
# can be deployed, scaled, and updated independently. Currently the
# monorepo ships one plugin: radio.
#
# Every service requires a profile — `docker compose up` with no
# COMPOSE_PROFILES starts nothing.  Set it in .env (see .env.example).
#
# The bot itself runs in karyl-chan/docker-compose.yml and creates the
# `karyl-chan-net` network — bring it up first.

x-plugin-base: &plugin-base
  restart: unless-stopped
  networks:
    - karyl-chan-net
  healthcheck:
    test:
      - CMD-SHELL
      - >-
        node -e "require('http').get('http://localhost:3000/health',
        r => process.exit(r.statusCode === 200 ? 0 : 1))
        .on('error', () => process.exit(1))"
    interval: 10s
    timeout: 3s
    retries: 5
    start_period: 10s

services:
  karyl-radio-plugin:
    <<: *plugin-base
    profiles: [radio]
    container_name: karyl-radio-plugin
    build:
      context: .
      dockerfile: Dockerfile.radio
    # No host-port mapping: the WebUI is reached via the bot proxy at
    # <WEB_BASE_URL>/plugin/karyl-radio/ (requires WEB_BASE_URL set on the
    # bot). For direct-access debugging only: re-add "ports: - '903:3000'"
    # and set RADIO_PUBLIC_URL=http://localhost:903 in .env.
    volumes:
      - radio-music:/app/data/music
      - radio-covers:/app/data/covers
    environment:
      # Only the values that differ from the SDK / plugin defaults are set
      # here (BOT_URL defaults to http://karyl-chan:3000, PORT to 3000,
      # MUSIC_DIR to /app/data/music, COVER_DIR to /app/data/covers —
      # all already correct for this compose).
      #
      # PLUGIN_URL must be explicit: the SDK default is http://<pluginKey>:3000
      # = http://karyl-radio:3000, but this service/container is karyl-radio-plugin.
      PLUGIN_URL: http://karyl-radio-plugin:3000
      KARYL_PLUGIN_SETUP_SECRET: ${KARYL_PLUGIN_SETUP_SECRET_RADIO:-}

  karyl-avalon-plugin:
    <<: *plugin-base
    profiles: [avalon]
    container_name: karyl-avalon-plugin
    build:
      context: .
      dockerfile: Dockerfile.avalon
    # Reached via the bot proxy at <WEB_BASE_URL>/plugin/karyl-avalon/.
    environment:
      PLUGIN_URL: http://karyl-avalon-plugin:3000
      KARYL_PLUGIN_SETUP_SECRET: ${KARYL_PLUGIN_SETUP_SECRET_AVALON:-}

volumes:
  radio-music:   # downloaded audio files
  radio-covers:  # uploaded cover images

networks:
  karyl-chan-net:
    external: true
