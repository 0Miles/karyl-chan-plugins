<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Karyl Radio</title>
  <style>
    :root {
      --bg: #0f0f13;
      --surface: #1a1a22;
      --surface-2: #20202a;
      --surface-hover: #262633;
      --border: #2b2b38;
      --text: #e6e6ec;
      --text-dim: #9090a4;
      --text-faint: #6b6b7e;
      --accent: #7c6bf0;
      --accent-hover: #9484f7;
      --accent-bg: #7c6bf022;
      --danger: #e0555f;
      --success: #4caf7c;
      --radius: 10px;
      --radius-sm: 7px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", sans-serif;
      background: var(--bg); color: var(--text); min-height: 100vh; padding: 24px 16px 48px;
      -webkit-font-smoothing: antialiased;
    }
    a { color: var(--accent-hover); }
    .wrap { max-width: 760px; margin: 0 auto; }
    header.app { display: flex; align-items: baseline; gap: 12px; margin-bottom: 20px; }
    header.app h1 { font-size: 1.35rem; font-weight: 650; }
    header.app .mode { color: var(--text-dim); font-size: 0.85rem; }
    .center-msg { text-align: center; padding: 64px 16px; color: var(--text-dim); }
    .center-msg h2 { color: var(--text); font-size: 1.15rem; margin-bottom: 8px; }

    button, input, select {
      font: inherit; border-radius: var(--radius-sm); border: 1px solid var(--border);
      outline: none; transition: border-color .15s, background-color .15s;
    }
    input, select {
      background: var(--surface-2); color: var(--text); padding: 9px 12px;
    }
    input:focus, select:focus { border-color: var(--accent); }
    button {
      background: var(--accent); color: #fff; border: none; cursor: pointer; font-weight: 550;
      padding: 9px 16px;
    }
    button:hover { background: var(--accent-hover); }
    button:disabled { opacity: .45; cursor: not-allowed; }
    button.ghost { background: var(--surface-2); color: var(--text); border: 1px solid var(--border); }
    button.ghost:hover { background: var(--surface-hover); }
    button.danger { background: var(--danger); }
    button.danger:hover { background: #c94650; }
    button.sm { padding: 5px 11px; font-size: .82rem; }
    button.icon { padding: 8px 12px; font-size: 1rem; line-height: 1; }

    .row { display: flex; gap: 8px; align-items: center; }
    .grow { flex: 1; min-width: 0; }

    .card {
      background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
      padding: 16px;
    }
    .card + .card { margin-top: 12px; }

    /* now playing */
    .np { display: flex; gap: 16px; align-items: center; }
    .np .cover {
      width: 96px; height: 96px; border-radius: var(--radius-sm); object-fit: cover; flex-shrink: 0;
      background: var(--surface-2);
    }
    .np .cover.placeholder { display: flex; align-items: center; justify-content: center; font-size: 2rem; color: var(--text-faint); }
    .np .meta { min-width: 0; flex: 1; }
    .np .title { font-size: 1.1rem; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .np .sub { color: var(--text-dim); font-size: .85rem; margin-top: 3px; }
    .np .badge {
      display: inline-flex; align-items: center; gap: 5px; margin-top: 8px;
      background: var(--accent-bg); color: var(--accent-hover); border-radius: 999px;
      padding: 3px 10px; font-size: .76rem; font-weight: 550;
    }

    .controls { display: flex; gap: 8px; margin-top: 14px; flex-wrap: wrap; }

    .list { list-style: none; display: flex; flex-direction: column; gap: 8px; margin-top: 4px; }
    .item {
      display: flex; gap: 12px; align-items: center; background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius-sm); padding: 10px 12px;
    }
    .item .thumb { width: 44px; height: 44px; border-radius: 6px; object-fit: cover; flex-shrink: 0; background: var(--surface-2); }
    .item .thumb.placeholder { display: flex; align-items: center; justify-content: center; color: var(--text-faint); font-size: 1.1rem; }
    .item .info { min-width: 0; flex: 1; }
    .item .name { font-weight: 550; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .item .dim { color: var(--text-dim); font-size: .8rem; margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .item .actions { display: flex; gap: 6px; flex-shrink: 0; }
    .idx { color: var(--text-faint); font-variant-numeric: tabular-nums; width: 1.6em; text-align: right; flex-shrink: 0; }
    .item.pending { opacity: .55; }

    .section-title { font-size: .8rem; text-transform: uppercase; letter-spacing: .06em; color: var(--text-faint); margin: 22px 0 8px; }
    /* Page section (Queue / Played) — needs its own top gap since its
       header sits in a .topbar (whose .section-title has margin:0). */
    .section { margin-top: 18px; }
    .empty { color: var(--text-dim); font-size: .9rem; padding: 14px 0; text-align: center; }

    /* modal */
    .modal-back {
      position: fixed; inset: 0; background: #0008; display: flex; align-items: center; justify-content: center;
      padding: 16px; z-index: 50;
    }
    .modal {
      background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
      width: min(440px, 100%); padding: 20px;
    }
    .modal h3 { font-size: 1.05rem; margin-bottom: 14px; }
    .field { margin-bottom: 12px; }
    .field label { display: block; font-size: .78rem; color: var(--text-dim); margin-bottom: 4px; }
    .field input { width: 100%; }
    .modal .foot { display: flex; justify-content: flex-end; gap: 8px; margin-top: 16px; }

    /* toast */
    #toast {
      position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%) translateY(20px);
      background: var(--surface-2); border: 1px solid var(--border); border-radius: var(--radius-sm);
      padding: 10px 18px; font-size: .85rem; opacity: 0; transition: opacity .25s, transform .25s;
      pointer-events: none; z-index: 100; max-width: 90vw;
    }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    #toast.error { border-color: var(--danger); }
    #toast.ok { border-color: var(--success); }

    .muted-link { color: var(--text-dim); font-size: .82rem; text-decoration: none; }
    .muted-link:hover { color: var(--text); }
    .topbar { display: flex; justify-content: space-between; align-items: center; gap: 8px; margin-bottom: 14px; }
  </style>
</head>
<body>
  <div class="wrap">
    <header class="app">
      <h1>📻 Karyl Radio</h1>
      <span class="mode" id="mode-label"></span>
    </header>
    <div id="root"></div>
  </div>
  <div id="toast"></div>

  <!-- Default for __PLUGIN_BASE__: set to "" so direct-access (http://localhost:903)
       works without any server injection. When served through the bot proxy, the
       server injects <script>window.__PLUGIN_BASE__="/plugin/karyl-radio"</script>
       earlier in <head>, and the || keeps it. -->
  <script>window.__PLUGIN_BASE__=window.__PLUGIN_BASE__||"";</script>
  <script>
  (function () {
    "use strict";
    // Under the bot proxy: window.location.origin is the bot's origin (e.g.
    // http://localhost:902) and __PLUGIN_BASE__ is "/plugin/karyl-radio",
    // so API = "http://localhost:902/plugin/karyl-radio" — all fetch calls
    // hit the bot's reverse-proxy, which forwards to the radio plugin.
    // In direct-access mode: __PLUGIN_BASE__ is "" so API = location.origin.
    const API = window.location.origin + (window.__PLUGIN_BASE__ || "");
    const root = document.getElementById("root");
    const modeLabel = document.getElementById("mode-label");
    const toastEl = document.getElementById("toast");

    // ── token ────────────────────────────────────────────────────────────
    function readToken() {
      const u = new URL(window.location.href);
      const fromUrl = u.searchParams.get("token");
      if (fromUrl) {
        sessionStorage.setItem("radio_token", fromUrl);
        u.searchParams.delete("token");
        // Under the proxy u.pathname is /plugin/karyl-radio/ — the prefix
        // is preserved automatically; no extra handling needed.
        history.replaceState(null, "", u.pathname + (u.search || "") + (u.hash || ""));
        return fromUrl;
      }
      return sessionStorage.getItem("radio_token");
    }
    function b64urlDecode(s) {
      s = s.replace(/-/g, "+").replace(/_/g, "/");
      while (s.length % 4) s += "=";
      return decodeURIComponent(
        atob(s).split("").map((c) => "%" + c.charCodeAt(0).toString(16).padStart(2, "0")).join("")
      );
    }
    function decodeJwt(tok) {
      try {
        const p = JSON.parse(b64urlDecode(tok.split(".")[1]));
        return p && typeof p === "object" ? p : null;
      } catch { return null; }
    }
    function clearToken() { sessionStorage.removeItem("radio_token"); }

    const token = readToken();
    const claims = token ? decodeJwt(token) : null;

    // ── toast ────────────────────────────────────────────────────────────
    let toastTimer = null;
    function toast(msg, kind) {
      toastEl.textContent = msg;
      toastEl.className = "show " + (kind || "");
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => { toastEl.className = ""; }, 3200);
    }

    // ── api ──────────────────────────────────────────────────────────────
    async function handleRes(res) {
      if (res.status === 401 || res.status === 403) {
        const e = await res.json().catch(() => ({ error: "Access denied" }));
        renderDenied(e.error || "Access denied — re-open the link / ask an admin.");
        clearToken();
        throw new Error(e.error || "denied");
      }
      if (!res.ok) {
        const e = await res.json().catch(() => ({ error: "Request failed" }));
        throw new Error(e.error || "Request failed");
      }
      if (res.status === 204) return {};
      return res.json().catch(() => ({}));
    }
    async function api(method, path, body) {
      const opts = { method, headers: { Authorization: "Bearer " + token } };
      if (body !== undefined) {
        opts.headers["Content-Type"] = "application/json";
        opts.body = JSON.stringify(body);
      }
      return handleRes(await fetch(API + path, opts));
    }
    /** Multipart POST of a single File (browser sets Content-Type/boundary). */
    async function apiUpload(path, file) {
      const fd = new FormData();
      fd.append("file", file, file.name);
      return handleRes(await fetch(API + path, {
        method: "POST",
        headers: { Authorization: "Bearer " + token },
        body: fd,
      }));
    }

    // ── helpers ──────────────────────────────────────────────────────────
    function esc(s) {
      return (s == null ? "" : String(s))
        .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;").replace(/'/g, "&#39;");
    }
    function el(html) { const t = document.createElement("template"); t.innerHTML = html.trim(); return t.content.firstElementChild; }
    function fmtDur(sec) { if (!sec || sec <= 0) return ""; const m = Math.floor(sec / 60), s = sec % 60; return m + ":" + String(s).padStart(2, "0"); }
    function fmtSize(b) { if (!b) return ""; return b < 1048576 ? (b / 1024).toFixed(0) + " KB" : (b / 1048576).toFixed(1) + " MB"; }
    function loopBadge(m) { return m === "track" ? "🔂 repeat track" : m === "queue" ? "🔁 loop queue" : "▶️ no loop"; }
    function nextLoop(m) { return m === "off" ? "track" : m === "track" ? "queue" : "off"; }
    function autoplayBadge(on) { return on ? "♾️ autoplay on" : "♾️ autoplay off"; }

    // ── access denied ────────────────────────────────────────────────────
    function renderDenied(msg) {
      modeLabel.textContent = "";
      root.innerHTML = "";
      root.appendChild(el(
        '<div class="center-msg"><h2>Access denied</h2><p>' + esc(msg) +
        '</p><p style="margin-top:14px">Use <code>/radio manage</code> or a <strong>play</strong>/<strong>queue</strong> response button to get a fresh link.</p></div>'
      ));
    }

    // ── session view ─────────────────────────────────────────────────────
    function renderSession(guildId) {
      modeLabel.textContent = "playback session";
      root.innerHTML = "";
      const npCard = el('<div class="card"><div class="np" id="np"></div><div class="controls" id="controls"></div></div>');
      const qInputCard = el(
        '<div class="card"><div class="row"><input id="q-add" class="grow" placeholder="Add to queue — station key / library title / http(s) URL" />' +
        '<button id="q-add-btn">➕ Add</button></div></div>'
      );
      const qWrap = el('<div class="section"><div class="topbar"><div class="section-title" style="margin:0">Queue</div><button class="ghost sm" id="q-clear">Clear</button></div><ul class="list" id="q-list"></ul></div>');
      const hWrap = el('<div class="section"><div class="topbar"><div class="section-title" style="margin:0">Played this session</div><button class="ghost sm" id="h-replay-all">↻ Re-queue all</button></div><ul class="list" id="h-list"></ul></div>');
      root.append(npCard, qInputCard, qWrap, hWrap);

      const npEl = npCard.querySelector("#np");
      const ctrlEl = npCard.querySelector("#controls");
      const qListEl = qWrap.querySelector("#q-list");
      const hListEl = hWrap.querySelector("#h-list");
      const addInput = qInputCard.querySelector("#q-add");

      // Last queue snapshot + the sources whose Add is still resolving
      // on the server — both feed renderQueueList(), so re-renders
      // (5 s auto-poll, dequeue, etc.) keep showing the "adding…" rows.
      let lastSnap = null;
      const pendingAdds = [];

      function renderQueueList() {
        const queue = (lastSnap && lastSnap.queue) || [];
        qListEl.innerHTML = "";
        if (queue.length === 0 && pendingAdds.length === 0) {
          qListEl.appendChild(el('<li class="empty">Queue is empty.</li>'));
          return;
        }
        queue.forEach((t, i) => {
          const thumb = t.coverUrl
            ? '<img class="thumb" src="' + esc(t.coverUrl) + '" alt="" onerror="this.style.display=&quot;none&quot;" />'
            : '<div class="thumb placeholder">🎵</div>';
          const li = el(
            '<li class="item"><span class="idx">' + (i + 1) + '.</span>' + thumb +
            '<div class="info"><div class="name">' + esc(t.label) + '</div>' +
            '<div class="dim">' + (t.queuedByName || t.queuedBy ? "queued by " + esc(t.queuedByName || t.queuedBy) : "") + '</div></div>' +
            '<div class="actions"><button class="ghost sm" title="Remove">✕</button></div></li>'
          );
          li.querySelector("button").onclick = () =>
            act("POST", "/api/session/" + encodeURIComponent(guildId) + "/dequeue/" + i);
          qListEl.appendChild(li);
        });
        pendingAdds.forEach((src) => {
          qListEl.appendChild(el(
            '<li class="item pending"><span class="idx"></span><div class="thumb placeholder">⏳</div>' +
            '<div class="info"><div class="name">' + esc(src) + '</div><div class="dim">adding…</div></div></li>'
          ));
        });
      }

      async function refresh() {
        let snap;
        try { snap = await api("GET", "/api/session/" + encodeURIComponent(guildId)); }
        catch { return; }
        lastSnap = snap;
        const cur = snap.current;
        const cover = cur && cur.coverUrl
          ? '<img class="cover" src="' + esc(cur.coverUrl) + '" alt="" onerror="this.style.display=&quot;none&quot;" />'
          : '<div class="cover placeholder">🎵</div>';
        const where = snap.channelId ? "in voice channel" : "not connected";
        npEl.innerHTML =
          cover +
          '<div class="meta">' +
          '<div class="title">' + (cur ? esc(cur.label) : '<span style="color:var(--text-dim)">Nothing playing</span>') + '</div>' +
          '<div class="sub">' + (cur && (cur.queuedByName || cur.queuedBy) ? "queued by " + esc(cur.queuedByName || cur.queuedBy) + " · " : "") + esc(where) + '</div>' +
          '<span class="badge">' + loopBadge(snap.loop) + '</span>' +
          (snap.autoplay ? '<span class="badge" style="margin-left:6px">♾️ autoplay</span>' : '') +
          '</div>';
        ctrlEl.innerHTML = "";
        const bPrev = el('<button class="ghost icon" title="Previous">⏮</button>');
        bPrev.disabled = !snap.hasPrev;
        bPrev.onclick = () => act("POST", "/api/session/" + encodeURIComponent(guildId) + "/prev");
        const bNext = el('<button class="ghost icon" title="Next">⏭</button>');
        bNext.onclick = () => act("POST", "/api/session/" + encodeURIComponent(guildId) + "/next");
        const bLoop = el('<button class="ghost sm">' + loopBadge(snap.loop) + "</button>");
        bLoop.onclick = () => act("POST", "/api/session/" + encodeURIComponent(guildId) + "/loop", { mode: nextLoop(snap.loop) });
        const bAuto = el('<button class="ghost sm">' + autoplayBadge(snap.autoplay) + "</button>");
        bAuto.onclick = () => act("POST", "/api/session/" + encodeURIComponent(guildId) + "/autoplay", { on: !snap.autoplay });
        ctrlEl.append(bPrev, bNext, bLoop, bAuto);

        renderQueueList();

        hListEl.innerHTML = "";
        const played = snap.played || [];
        hWrap.querySelector("#h-replay-all").disabled = played.length === 0;
        if (played.length === 0) {
          hListEl.appendChild(el('<li class="empty">Nothing played yet this session.</li>'));
        } else {
          // Newest first for display; re-queue by the entry's stable `seq`.
          for (let i = played.length - 1; i >= 0; i--) {
            const t = played[i];
            const thumb = t.coverUrl
              ? '<img class="thumb" src="' + esc(t.coverUrl) + '" alt="" onerror="this.style.display=&quot;none&quot;" />'
              : '<div class="thumb placeholder">🎵</div>';
            const li = el(
              '<li class="item">' + thumb +
              '<div class="info"><div class="name">' + esc(t.label) + '</div>' +
              '<div class="dim">' + (t.queuedByName || t.queuedBy ? "queued by " + esc(t.queuedByName || t.queuedBy) : "") + '</div></div>' +
              '<div class="actions"><button class="ghost sm" title="Re-queue this track">↻</button></div></li>'
            );
            li.querySelector("button").onclick = () =>
              act("POST", "/api/session/" + encodeURIComponent(guildId) + "/replay/" + t.seq);
            hListEl.appendChild(li);
          }
        }
      }
      async function act(method, path, body) {
        try { await api(method, path, body); await refresh(); }
        catch (e) { toast(e.message, "error"); }
      }
      async function handleAdd() {
        const v = addInput.value.trim();
        if (!v) return;
        addInput.value = "";          // clear the input immediately
        pendingAdds.push(v);
        renderQueueList();            // show an "adding…" row right away
        try {
          await api("POST", "/api/session/" + encodeURIComponent(guildId) + "/queue", { source: v });
          toast("Queued", "ok");
        } catch (e) {
          toast(e.message || "Add failed", "error");
        } finally {
          const i = pendingAdds.indexOf(v);
          if (i !== -1) pendingAdds.splice(i, 1);
          renderQueueList();   // drop the placeholder now, even if the refresh below fails
          await refresh();
        }
      }
      qInputCard.querySelector("#q-add-btn").onclick = handleAdd;
      addInput.addEventListener("keydown", (e) => { if (e.key === "Enter") handleAdd(); });
      qWrap.querySelector("#q-clear").onclick = () => act("POST", "/api/session/" + encodeURIComponent(guildId) + "/clear");
      hWrap.querySelector("#h-replay-all").onclick = () => act("POST", "/api/session/" + encodeURIComponent(guildId) + "/replay-all");

      refresh();
      setInterval(refresh, 5000);
    }

    // ── manage view ──────────────────────────────────────────────────────
    function renderManage() {
      modeLabel.textContent = "admin · library";
      root.innerHTML = "";
      const dl = el(
        '<div class="card"><div class="row"><input id="dl-url" class="grow" placeholder="URL to download — YouTube / SoundCloud / direct media (re-uses if already saved)" />' +
        '<button id="dl-btn">⬇ Download</button></div></div>'
      );
      const search = el('<div class="card"><div class="row"><input id="q" class="grow" placeholder="Search title / album / author / URL…" /><button class="ghost" id="q-btn">Search</button></div></div>');
      const listWrap = el('<div><div class="section-title">Library</div><ul class="list" id="tlist"></ul></div>');
      root.append(dl, search, listWrap);
      const tlist = listWrap.querySelector("#tlist");

      async function load() {
        const q = search.querySelector("#q").value.trim();
        let data;
        try { data = await api("GET", "/api/tracks" + (q ? "?q=" + encodeURIComponent(q) : "")); }
        catch (e) { toast(e.message, "error"); return; }
        const tracks = data.tracks || [];
        tlist.innerHTML = "";
        if (tracks.length === 0) { tlist.appendChild(el('<li class="empty">No tracks.</li>')); return; }
        for (const t of tracks) {
          const thumb = t.coverUrl
            ? '<img class="thumb" src="' + esc(t.coverUrl) + '" alt="" onerror="this.style.display=&quot;none&quot;" />'
            : '<div class="thumb placeholder">🎵</div>';
          const sub = [t.author, t.album, fmtDur(t.duration), fmtSize(t.sizeBytes)].filter(Boolean).map(esc).join(" · ");
          const li = el(
            '<li class="item">' + thumb +
            '<div class="info"><div class="name">' + esc(t.title) + '</div><div class="dim">' + (sub || "&nbsp;") + '</div></div>' +
            '<div class="actions"><button class="ghost sm">✎ Edit</button><button class="danger sm">🗑</button></div></li>'
          );
          const [editBtn, delBtn] = li.querySelectorAll("button");
          editBtn.onclick = () => openEdit(t, load);
          delBtn.onclick = async () => {
            if (!confirm("Delete \"" + t.title + "\"? This removes the audio file.")) return;
            try { await api("DELETE", "/api/tracks/" + encodeURIComponent(t.id)); toast("Deleted", "ok"); load(); }
            catch (e) { toast(e.message, "error"); }
          };
          tlist.appendChild(li);
        }
      }
      search.querySelector("#q-btn").onclick = load;
      search.querySelector("#q").addEventListener("keydown", (e) => { if (e.key === "Enter") load(); });
      dl.querySelector("#dl-btn").onclick = async () => {
        const u = dl.querySelector("#dl-url").value.trim();
        if (!u) return;
        const btn = dl.querySelector("#dl-btn");
        btn.disabled = true; btn.textContent = "⬇ Downloading…";
        try {
          const r = await api("POST", "/api/tracks/download", { url: u });
          dl.querySelector("#dl-url").value = "";
          if (r && r.alreadyExisted) { toast("Already in library", "ok"); load(); }
          else { toast("Download started — refresh shortly", "ok"); setTimeout(load, 6000); }
        }
        catch (e) { toast(e.message, "error"); }
        finally { btn.disabled = false; btn.textContent = "⬇ Download"; }
      };
      dl.querySelector("#dl-url").addEventListener("keydown", (e) => { if (e.key === "Enter") dl.querySelector("#dl-btn").click(); });
      load();
    }

    function openEdit(track, onSaved) {
      const back = el('<div class="modal-back"></div>');
      const m = el(
        '<div class="modal"><h3>Edit metadata</h3>' +
        '<div class="field"><label>Title</label><input id="f-title" /></div>' +
        '<div class="field"><label>Author / artist</label><input id="f-author" /></div>' +
        '<div class="field"><label>Album</label><input id="f-album" /></div>' +
        '<div class="field"><label>Cover image URL</label><input id="f-cover" placeholder="https://… (or upload below)" /></div>' +
        '<div class="field"><label>Upload cover image (jpg / png / webp / gif, ≤ 5 MB)</label>' +
        '<div class="row"><input id="f-coverfile" type="file" class="grow" accept="image/jpeg,image/png,image/webp,image/gif" />' +
        '<button class="ghost" id="m-upload" type="button">⬆ Upload</button></div></div>' +
        '<div class="foot"><button class="ghost" id="m-cancel">Cancel</button><button id="m-save">Save</button></div></div>'
      );
      back.appendChild(m);
      m.querySelector("#f-title").value = track.title || "";
      m.querySelector("#f-author").value = track.author || "";
      m.querySelector("#f-album").value = track.album || "";
      m.querySelector("#f-cover").value = track.coverUrl || "";
      const close = () => back.remove();
      back.addEventListener("click", (e) => { if (e.target === back) close(); });
      m.querySelector("#m-cancel").onclick = close;
      m.querySelector("#m-upload").onclick = async () => {
        const f = m.querySelector("#f-coverfile").files[0];
        if (!f) { toast("Pick an image file first", "error"); return; }
        const btn = m.querySelector("#m-upload"); btn.disabled = true; btn.textContent = "⬆ Uploading…";
        try {
          const r = await apiUpload("/api/tracks/" + encodeURIComponent(track.id) + "/cover", f);
          if (r && r.track && r.track.coverUrl) m.querySelector("#f-cover").value = r.track.coverUrl;
          toast("Cover uploaded", "ok");
          onSaved && onSaved();
        } catch (e) { toast(e.message, "error"); }
        finally { btn.disabled = false; btn.textContent = "⬆ Upload"; }
      };
      m.querySelector("#m-save").onclick = async () => {
        const patch = {
          title: m.querySelector("#f-title").value,
          author: m.querySelector("#f-author").value,
          album: m.querySelector("#f-album").value,
          coverUrl: m.querySelector("#f-cover").value,
        };
        const btn = m.querySelector("#m-save"); btn.disabled = true;
        try { await api("PATCH", "/api/tracks/" + encodeURIComponent(track.id), patch); toast("Saved", "ok"); close(); onSaved && onSaved(); }
        catch (e) { toast(e.message, "error"); btn.disabled = false; }
      };
      document.body.appendChild(back);
      m.querySelector("#f-title").focus();
    }

    // ── boot ─────────────────────────────────────────────────────────────
    if (!token || !claims) {
      renderDenied("No valid token. Run /radio manage or use a play/queue response button.");
      return;
    }
    const caps = Array.isArray(claims.capabilities) ? claims.capabilities : [];
    const PLUGIN_KEY = "karyl-radio";
    const isAdmin = caps.indexOf("admin") !== -1 || caps.indexOf("plugin:" + PLUGIN_KEY + ":webui.access") !== -1;
    if (claims.guildId) {
      renderSession(String(claims.guildId));
    } else if (isAdmin) {
      renderManage();
    } else {
      renderDenied("This link doesn't grant access to the admin panel.");
    }
  })();
  </script>
</body>
</html>
